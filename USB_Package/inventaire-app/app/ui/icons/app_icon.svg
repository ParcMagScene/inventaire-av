<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1129"/>
      <stop offset="100%" style="stop-color:#151a3a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5090;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6a70b0;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi bleu très foncé -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Cercle décoratif -->
  <circle cx="256" cy="230" r="155" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!-- Barres verticales (style equalizer / mag scene) -->
  <!-- Barre gauche courte -->
  <rect x="196" y="170" width="14" height="40" rx="4" fill="#ffffff"/>
  <!-- Barre centre-gauche moyenne -->
  <rect x="220" y="150" width="14" height="60" rx="4" fill="#ffffff"/>
  <!-- Barre centre (haute, accent rouge) -->
  <rect x="244" y="120" width="14" height="90" rx="4" fill="#ff1a1a"/>
  <!-- Barre centre-droite moyenne -->
  <rect x="268" y="150" width="14" height="60" rx="4" fill="#ffffff"/>
  <!-- Barre droite courte -->
  <rect x="292" y="170" width="14" height="40" rx="4" fill="#ffffff"/>

  <!-- Texte "mag" -->
  <text x="256" y="262" text-anchor="middle" fill="#ffffff" font-family="Arial Black,Arial,sans-serif" font-size="60" font-weight="900" letter-spacing="-2">mag</text>

  <!-- Texte "SCENE" -->
  <text x="256" y="290" text-anchor="middle" fill="#ff1a1a" font-family="Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="8">SCENE</text>

  <!-- Label "INVENTAIRE" en bas -->
  <text x="256" y="440" text-anchor="middle" fill="#7c6dff" font-family="Arial Black,Arial,sans-serif" font-size="42" font-weight="900" letter-spacing="3">INVENTAIRE</text>
</svg>
